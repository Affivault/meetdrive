services:
  - type: web
    name: sincerely-api
    runtime: node
    # Render auto-detects Node version from .nvmrc / engines field; pin here too.
    buildCommand: npm install --include=dev && npm run build --workspace=shared && npm run build --workspace=server
    startCommand: npm run start --workspace=server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: sincerely-redis
          type: redis
          property: connectionString
      - key: API_BASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: TRACKING_BASE_URL
        sync: false
      - key: TRACKING_SECRET
        sync: false
      - key: ENCRYPTION_KEY
        sync: false

  - type: redis
    name: sincerely-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
